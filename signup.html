<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">

    <style>
        * {
            margin: 0px;
            padding: 0px;
            text-decoration: none;
            font-family: sans-serif;

        }

        body {
            background-image: #34495e;
        }

        .joinForm {
            position: absolute;
            width: 400px;
            height: 400px;
            padding: 30px, 20px;
            background-color: #FFFFFF;
            text-align: center;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 15px;
        }

        .joinForm h2 {
            text-align: center;
            margin: 30px;
        }

        .textForm {
            border-bottom: 2px solid #adadad;
            margin: 30px;
            padding: 10px 10px;
        }


        .id {
            width: 100%;
            border: none;
            outline: none;
            color: #636e72;
            font-size: 16px;
            height: 25px;
            background: none;
        }

        .pw {
            width: 100%;
            border: none;
            outline: none;
            color: #636e72;
            font-size: 16px;
            height: 25px;
            background: none;
        }

        .name {
            width: 100%;
            border: none;
            outline: none;
            color: #636e72;
            font-size: 16px;
            height: 25px;
            background: none;
        }

        .email {
            width: 100%;
            border: none;
            outline: none;
            color: #636e72;
            font-size: 16px;
            height: 25px;
            background: none;
        }

        .nickname {
            width: 100%;
            border: none;
            outline: none;
            color: #636e72;
            font-size: 16px;
            height: 25px;
            background: none;
        }

        .cellphoneNo {
            width: 100%;
            border: none;
            outline: none;
            color: #636e72;
            font-size: 16px;
            height: 25px;
            background: none;
        }

        .btn {
            position: relative;
            left: 40%;
            transform: translateX(-50%);
            margin-bottom: 40px;
            width: 80%;
            height: 40px;
            background: linear-gradient(125deg, #81ecec, #6c5ce7, #81ecec);
            background-position: left;
            background-size: 200%;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.4s;
            display: inline;
        }

        .btn:hover {
            background-position: right;
        }

        i {
            padding-left: 5px;
        }
    </style>
</head>

<body>

    <form action="doJoin" method="POST" class="joinForm" onsubmit="DoJoinForm__submit(this); return false;">

        <h2>회원가입</h2>
        <div class="textForm">
            <input name="loginId" type="text" class="id" placeholder="아이디" id="id1" onblur="idCheck()">
            <p id="idChecker" style="font-size: 10px;"></p>
        </div>

        <div class="textForm">
            <input name="loginPw" type="password" class="pw" placeholder="비밀번호" id="pw1">
        </div>
        <div class="textForm">
            <input name="loginPwConfirm" type="password" class="pw" placeholder="비밀번호 확인" id="pw2" onblur="pwCheck()">
            <p id="pwChecker" style="font-size: 10px"></p>
        </div>

        <div class="textForm">
            <input name="name" type="text" class="name" placeholder="이름" id="name1"onblur="nameCheck()">
            <p id="nameChecker" style="font-size: 10px;"></p>
        </div>
        <div class="textForm">
            <input name="email" type="text" class="email" placeholder="이메일">
        </div>
        <div class="textForm">
            <input name="nickname" type="text" class="nickname" placeholder="닉네임">
        </div>
        <div class="textForm">
            <input name="cellphoneNo" type="text" class="cellphoneNo" placeholder="전화번호">
        </div>
        <button class="btn" id=""><a href="./index.html">가입하기</a></button>
    </form>
    </div>
</body>
<script>
    function idCheck() {
        const id1 = document.getElementById("id1").value;
        const idChecker = document.getElementById("idChecker");
        const exp = /^(?=.*[a-z])[a-z\d]{5,10}$/

        if (id1.length == 0) {
            idChecker.innerHTML = "필수입력 입니다";
            idChecker.style.color = "red";

        } else if (id1.match(exp)) {
            idChecker.innerHTML = "사용가능한 아이디입니다";
            idChecker.style.color = "green";
        } else {
            idChecker.innerHTML = "사용 할 수 없는 아이디입니다";
            idChecker.style.color = "red";
        }
    }
    function pwCheck() {
        const pw1 = document.getElementById("pw1").value;
        const pw2 = document.getElementById("pw2").value;
        const pwChecker = document.getElementById("pwChecker");
        if (pw1 == pw2) {
            pwChecker.innerHTML = "비밀번호가 일치합니다";
            pwChecker.style.color = "green";
        } else if (pw2.length == 0) {
            pwChecker.innerHTML = "필수입력 입니다";
            pwChecker.style.color = "red";
        } else if (pw1 != pw2) {
            pwChecker.innerHTML = "비밀번호가 일치하지 않습니다";
            pwChecker.style.color = "red";
        }
    }
    function nameChecker() {
        const name1 = document.getElementById("name1").value;
        const nameChecker = document.getElementById("nameChecker")
        if(name1.length == 0) {
            nameChecker.innerHTML = "필수입력 입니다";
            nameChecker.style.color = "red";
        }
    }
    
</script>

</html>
